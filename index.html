<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday + Countdown Fireworks</title>

    <style>
        body {
            margin: 0;
            background: #111;
            overflow: hidden;
            height: 100vh;
            font-family: monospace;
        }

        /* ===== CONTAINER ===== */
        #columns {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        /* ===== COLUMN ===== */
        .column {
            position: absolute;
            display: flex;
            flex-direction: column;
            gap: 2px;
            top: 0;
        }

        /* ===== TEXT ===== */
        .char {
            font-size: clamp(10px, 1.5vw, 14px);
            color: rgb(235, 6, 6);
            opacity: 0;
            animation: drop 1s linear forwards;
        }

        @keyframes drop {
            0% {
                transform: translateY(-50px);
                opacity: 0;
            }

            20% {
                opacity: 1;
            }

            100% {
                transform: translateY(100vh);
                opacity: 1;
            }
        }

        /* ===== NUMBER ===== */
        .number {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(60px, 10vw, 120px);
            font-weight: bold;
            z-index: 10;

            background: linear-gradient(90deg, red, orange, yellow, green, cyan, blue, violet);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            text-shadow: 0 0 10px red, 0 0 20px orange;

            animation: pulse 0.8s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
            }

            50% {
                transform: translate(-50%, -50%) scale(1.2);
            }
        }

        /* ===== FIREWORK ===== */
        .firework {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            opacity: 0.9;
            box-shadow: 0 0 8px currentColor, 0 0 15px currentColor;
            animation: explode 1s ease-out forwards;
        }

        @keyframes explode {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }

            100% {
                transform: translate(var(--x), var(--y)) scale(0);
                opacity: 0;
            }
        }

        /* ===== HEART ===== */
        .heart {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: clamp(80px, 12vw, 140px);
            z-index: 20;

            background: linear-gradient(45deg, red, pink, violet);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            animation: heartPop 1s forwards, pulse 1s infinite 1s;
        }

        @keyframes heartPop {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }

            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        /* ===== ROCKET ===== */
        .rocket {
            position: absolute;
            width: 4px;
            height: 12px;
            background: white;
            bottom: 0;
            animation: shoot 0.8s linear forwards;
        }

        @keyframes shoot {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(-80vh);
            }
        }
    </style>
</head>

<body>

    <div id="columns"></div>
    <div class="number" id="number">10</div>

    <script>
        // ===== CONFIG =====
        const word = ["H", "A", "P", "P", "Y", "B", "I", "R", "T", "H", "D", "A", "Y"];
        const colors = ["#ff0000", "#ff7f00", "#ffff00", "#00ff00", "#00ffff", "#0000ff", "#8b00ff"];

        const container = document.getElementById('columns');
        let columns = [];

        // ===== CREATE COLUMNS (FIX FULL WIDTH) =====
        function createColumns() {
            container.innerHTML = "";
            columns = [];

            const spacing = window.innerWidth < 768 ? 18 : 28;
            const total = Math.floor(window.innerWidth / spacing);

            const totalWidth = total * spacing;
            const startX = (window.innerWidth - totalWidth) / 2;

            for (let i = 0; i < total; i++) {
                const col = document.createElement('div');
                col.classList.add('column');
                col.style.left = (startX + i * spacing) + 'px';

                const letter = word[i % word.length];
                container.appendChild(col);

                columns.push({ column: col, letter });
            }
        }

        createColumns();

        // ===== FALLING TEXT =====
        function createLetter(c) {
            const span = document.createElement('span');
            span.classList.add('char');
            span.textContent = c.letter;
            c.column.appendChild(span);

            setTimeout(() => span.remove(), 1000);
        }

        setInterval(() => {
            columns.forEach(createLetter);
        }, 100);


        // ===== FIREWORK CENTER =====
        const numberEl = document.getElementById('number');
        let count = 10;

        function createFirework(x, y) {
            for (let i = 0; i < 50; i++) {
                const dot = document.createElement('div');
                dot.classList.add('firework');

                const angle = Math.random() * Math.PI * 2;
                const radius = 80 + Math.random() * 140;

                dot.style.setProperty('--x', Math.cos(angle) * radius + 'px');
                dot.style.setProperty('--y', Math.sin(angle) * radius + 'px');

                const color = colors[Math.floor(Math.random() * colors.length)];
                dot.style.background = color;
                dot.style.color = color;

                dot.style.left = x + 'px';
                dot.style.top = y + 'px';

                document.body.appendChild(dot);
                setTimeout(() => dot.remove(), 1000);
            }
        }


        // ===== COUNTDOWN =====
        function countdown() {
            if (count > 0) {
                numberEl.textContent = count;
                createFirework(window.innerWidth / 2, window.innerHeight / 2);
                count--;
                setTimeout(countdown, 1000);
            } else {
                numberEl.textContent = "";
                showHeart();
                setInterval(shootFirework, 250);
            }
        }

        countdown();


        // ===== HEART =====
        function showHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = "❤";
            document.body.appendChild(heart);
        }


        // ===== ROCKET FIREWORK =====
        function shootFirework() {
            const x = Math.random() * window.innerWidth;

            const rocket = document.createElement('div');
            rocket.classList.add('rocket');
            rocket.style.left = x + 'px';

            document.body.appendChild(rocket);

            setTimeout(() => {
                rocket.remove();
                createFirework(x, window.innerHeight * 0.2);
            }, 800);
        }


        // ===== RESPONSIVE REALTIME (KHÔNG RELOAD) =====
        window.addEventListener("resize", createColumns);
    </script>

</body>

</html>
