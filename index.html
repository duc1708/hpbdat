<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday + Countdown Fireworks</title>

    <style>
        body {
            margin: 0;
            background: #111;
            overflow: hidden;
            height: 100vh;
            font-family: monospace;
        }

        /* ===== CONTAINER ===== */
        #columns {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        /* ===== COLUMN ===== */
        .column {
            position: absolute;
            display: flex;
            flex-direction: column;
            gap: 2px;
            top: 0;
        }

        /* ===== TEXT ===== */
        .char {
            font-size: clamp(10px, 1.5vw, 14px);
            opacity: 0;
            animation: drop 1s linear forwards;
            text-shadow:
                0 0 5px red,
                0 0 10px orange,
                0 0 20px yellow;
        }

        @keyframes drop {
            0% {
                transform: translateY(-50px);
                opacity: 0;
            }

            20% {
                opacity: 1;
            }

            100% {
                transform: translateY(100vh);
                opacity: 1;
            }
        }

        /* ===== NUMBER ===== */
        .number {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(60px, 10vw, 120px);
            font-weight: bold;
            z-index: 10;

            background: linear-gradient(90deg, red, orange, yellow, green, cyan, blue, violet);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            text-shadow: 0 0 10px red, 0 0 20px orange;

            animation: pulse 0.8s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
            }

            50% {
                transform: translate(-50%, -50%) scale(1.2);
            }
        }

        /* ===== FIREWORK ===== */
        .firework {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            opacity: 0.9;
            box-shadow: 0 0 8px currentColor, 0 0 15px currentColor;
            animation: explode 1s ease-out forwards;
        }

        @keyframes explode {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }

            100% {
                transform: translate(var(--x), var(--y)) scale(0);
                opacity: 0;
            }
        }

        /* ===== HEART ===== */
        .heart {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: clamp(120px, 18vw, 220px);
            z-index: 20;

            background: linear-gradient(45deg, red, pink, violet);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            text-shadow:
                0 0 20px red,
                0 0 40px pink,
                0 0 60px violet;

            animation: heartPop 1s forwards, pulse 1s infinite 1s;
        }

        .message {
            position: absolute;
            top: 65%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(24px, 5vw, 60px);
            font-weight: bold;
            text-align: center;
            opacity: 0;
            z-index: 20;

            background: linear-gradient(90deg, red, orange, yellow, green, cyan, blue, violet);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            animation: fadeIn 2s forwards;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translate(-50%, 20px);
            }

            100% {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
        }

        @keyframes heartPop {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }

            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        /* ===== ROCKET ===== */
        .rocket {
            position: absolute;
            width: 4px;
            height: 12px;
            background: white;
            bottom: 0;
            animation: shoot 0.8s linear forwards;
        }

        @keyframes shoot {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(-80vh);
            }
        }

        #section-2 {
            display: none;
        }




        /* zoom trái tim */
        .zoom-heart {
            animation: zoomHeart 1.5s ease forwards;
            /* chậm hơn */
        }

        @keyframes zoomHeart {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }

            100% {
                transform: translate(-50%, -50%) scale(25);
                opacity: 0;
            }
        }

        /* fade scene */
        .section {
            position: absolute;
            width: 100%;
            height: 100%;
            transition: opacity 0.6s ease;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div id="section-1" class="section">
        <div id="columns"></div>
    </div>

    <div id="section-2" class="section hidden">
        <h1 style="color:white; text-align:center; margin-top:40vh;">
            🎉 Welcome to your surprise 🎉
        </h1>
    </div>
    <div class="number" id="number">10</div>

    <script>
        // ===== CONFIG =====
        const word = ["H", "A", "P", "P", "Y", "B", "I", "R", "T", "H", "D", "A", "Y"];
        const colors = [
            "#ff0000",
            "#ff7f00",
            "#ffff00",
            "#00ff00",
            "#00ffff",
            "#0000ff",
            "#8b00ff"
        ];


        const container = document.getElementById('columns');
        let columns = [];


        function showHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = "❤";
            heart.style.cursor = "pointer";

            document.body.appendChild(heart);

            // tạo text
            const msg = document.createElement('div');
            msg.classList.add('message');
            msg.innerHTML = "Happy Birthday 🎉";
            document.body.appendChild(msg);

            // CLICK
            heart.addEventListener("click", () => {

                // 💥 STOP EVERYTHING
                clearInterval(rainInterval);
                clearInterval(fireworkInterval);

                // ❌ xóa chữ rơi
                document.getElementById("columns").innerHTML = "";

                // ❌ xóa tất cả pháo hoa
                document.querySelectorAll(".firework, .rocket").forEach(el => el.remove());

                // ❌ xóa text
                msg.remove();

                // zoom heart
                heart.classList.add("zoom-heart");

                // fade section 1
                document.getElementById("section-1").classList.add("hidden");

                // chuyển scene
                setTimeout(() => {
                    document.getElementById("section-2").classList.remove("hidden");

                    // ❌ xóa luôn heart sau khi chuyển
                    heart.remove();
                }, 1200);
            });
        }


        // ===== CREATE COLUMNS (FIX FULL WIDTH) =====
        function createColumns() {
            container.innerHTML = "";
            columns = [];

            const spacing = window.innerWidth < 768 ? 16 : 26;
            const total = Math.ceil(window.innerWidth / spacing);

            const totalWidth = (total - 1) * spacing;
            const startX = (window.innerWidth - totalWidth) / 2;

            for (let i = 0; i < total; i++) {
                const col = document.createElement('div');
                col.classList.add('column');
                col.style.left = (startX + i * spacing) + 'px';

                const letter = word[i % word.length];
                container.appendChild(col);

                columns.push({ column: col, letter });
            }
        }

        createColumns();

        // ===== FALLING TEXT =====
        function createLetter(c) {
            const span = document.createElement('span');
            span.classList.add('char');
            span.textContent = c.letter;

            // random màu
            span.style.color = colors[Math.floor(Math.random() * colors.length)];

            c.column.appendChild(span);

            setTimeout(() => span.remove(), 1000);
        }

        setInterval(() => {
            columns.forEach(createLetter);
        }, 100);


        // ===== FIREWORK CENTER =====
        const numberEl = document.getElementById('number');
        let count = 10;

        function createFirework(x, y) {
            for (let i = 0; i < 50; i++) {
                const dot = document.createElement('div');
                dot.classList.add('firework');

                const angle = Math.random() * Math.PI * 2;
                const radius = 80 + Math.random() * 140;

                dot.style.setProperty('--x', Math.cos(angle) * radius + 'px');
                dot.style.setProperty('--y', Math.sin(angle) * radius + 'px');

                const color = colors[Math.floor(Math.random() * colors.length)];
                dot.style.background = color;
                dot.style.color = color;

                dot.style.left = x + 'px';
                dot.style.top = y + 'px';

                document.body.appendChild(dot);
                setTimeout(() => dot.remove(), 1000);
            }
        }

        let rainInterval = setInterval(() => {
            columns.forEach(createLetter);
        }, 10000);

        // ===== COUNTDOWN =====
        let fireworkInterval;

        function countdown() {
            if (count > 0) {
                numberEl.textContent = count;
                createFirework(window.innerWidth / 2, window.innerHeight / 2);
                count--;
                setTimeout(countdown, 1000);
            } else {
                numberEl.textContent = "";
                showHeart();

                fireworkInterval = setInterval(shootFirework, 250);
            }
        }
        countdown();


        // ===== ROCKET FIREWORK =====
        function shootFirework() {
            const x = Math.random() * window.innerWidth;

            const rocket = document.createElement('div');
            rocket.classList.add('rocket');
            rocket.style.left = x + 'px';

            document.body.appendChild(rocket);

            setTimeout(() => {
                rocket.remove();
                createFirework(x, window.innerHeight * 0.2);
            }, 800);
        }


        // ===== RESPONSIVE REALTIME (KHÔNG RELOAD) =====
        window.addEventListener("resize", createColumns);
    </script>

</body>

</html>
